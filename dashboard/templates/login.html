<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — TFG IoT Monitor</title>
<style>
  :root {
    --bg: #f4f6f9;
    --card: #ffffff;
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --text: #1e293b;
    --muted: #64748b;
    --border: #e2e8f0;
    --error: #ef4444;
    --shadow: 0 4px 24px rgba(0,0,0,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .login-container {
    background: var(--card);
    border-radius: 16px;
    box-shadow: var(--shadow);
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
  }

  .login-header {
    text-align: center;
    margin-bottom: 36px;
  }

  .login-icon {
    width: 56px;
    height: 56px;
    background: linear-gradient(135deg, var(--primary), #7c3aed);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    font-size: 24px;
  }

  .login-header h1 {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
  }

  .login-header p {
    font-size: 14px;
    color: var(--muted);
    font-weight: 300;
  }

  .form-group {
    margin-bottom: 20px;
  }

  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 6px;
  }

  .form-group input {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: inherit;
    font-size: 15px;
    color: var(--text);
    background: var(--bg);
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }

  .form-group input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
  }

  .error-msg {
    background: #fef2f2;
    color: var(--error);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 20px;
    border: 1px solid #fecaca;
  }

  .login-btn {
    width: 100%;
    padding: 13px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }

  .login-btn:hover {
    background: var(--primary-dark);
  }

  .login-btn:active {
    transform: scale(0.98);
  }

  .footer-text {
    text-align: center;
    margin-top: 24px;
    font-size: 12px;
    color: var(--muted);
  }
</style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <div class="login-icon">🛡️</div>
      <h1>TFG IoT Monitor</h1>
      <p>Panel de monitorización de sensores</p>
    </div>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="form-group">
        <label>Usuario</label>
        <input type="text" name="username" placeholder="Introduce tu usuario" required autofocus>
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" name="password" placeholder="Introduce tu contraseña" required>
      </div>
      <button type="submit" class="login-btn">Acceder al panel</button>
    </form>

    <p class="footer-text">TFG — Sistema IDS Wi-Fi para IoT · UCM 2026</p>
  </div>
</body>
</html>
